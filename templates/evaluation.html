<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Report Evaluation</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
      body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; }
      .container { max-width: 760px; margin: 32px auto; background: white; padding: 24px; border-radius: 12px; }
      .summary { background: #f8fafc; padding: 14px; border-radius: 8px; margin-bottom: 18px; }
      .field { margin-bottom: 14px; }
      label { display: block; margin-bottom: 5px; color: #334155; }
      textarea, select, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; }
      textarea { min-height: 110px; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; }
      .message { margin-top: 12px; color: #166534; }
    </style>
  </head>
  <body>
    {% include "_navbar.html" %}
    <div class="container">
      <h1>Operation Evaluation</h1>
      <div class="summary">
        <b>Report #{{ report.id }}</b><br />
        Student: {{ report.student_name }}<br />
        Phone: {{ report.student_id }}<br />
        Teacher: {{ report.teacher_name }}<br />
        Educational Consultant: {{ report.sales_name or 'Unassigned' }}<br />
        Status: {{ report.status }}
      </div>

      <div class="field">
        <label>Teacher Rating</label>
        <select id="rating_teacher">
          <option value="">Select rating</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>

      <div class="field">
        <label>Teacher Notes</label>
        <textarea id="teacher_notes"></textarea>
      </div>

      <div class="field">
        <label>Educational Consultant Rating</label>
        <select id="rating_sales">
          <option value="">Select rating</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>

      <div class="field">
        <label>Educational Consultant Notes</label>
        <textarea id="sales_notes"></textarea>
      </div>

      <button onclick="submitEvaluation()">Save Evaluation</button>
      <div id="message" class="message"></div>
    </div>

    <script>
      async function submitEvaluation() {
        const response = await fetch("/reports/{{ report.id }}/evaluate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            rating_teacher: document.getElementById("rating_teacher").value || null,
            rating_sales: document.getElementById("rating_sales").value || null,
            teacher_notes: document.getElementById("teacher_notes").value,
            sales_notes: document.getElementById("sales_notes").value,
          }),
        });
        const payload = await response.json();
        if (!response.ok) { alert(payload.error || "Evaluation failed"); return; }
        document.getElementById("message").innerText = "Evaluation saved successfully.";
      }
    </script>
  </body>
</html>
