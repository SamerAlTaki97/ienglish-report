<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Owner User Management</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
      body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; color: #0f172a; }
      .container { max-width: 1180px; margin: 32px auto; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08); }
      .head { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
      h1 { margin: 0; }
      .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
      input, select, button { padding: 10px 12px; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; font: inherit; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: 700; }
      .danger { background: #b91c1c; }
      .dark { background: #111827; }
      .ghost { background: white; color: #111827; border: 1px solid #cbd5e1; }
      .success { background: #16a34a; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .feedback { margin-top: 12px; color: #166534; font-size: 14px; font-weight: 700; min-height: 18px; }
      table { width: 100%; border-collapse: collapse; }
      td, th { padding: 12px 10px; border-bottom: 1px solid #e5e7eb; text-align: left; vertical-align: middle; }
      th { background: #f8fafc; color: #475569; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; }
      .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.48); display: none; align-items: center; justify-content: center; padding: 22px; z-index: 1000; }
      .modal-backdrop.open { display: flex; }
      .modal { width: min(520px, 100%); background: white; border-radius: 18px; box-shadow: 0 28px 60px rgba(15, 23, 42, 0.26); overflow: hidden; }
      .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 20px 22px; border-bottom: 1px solid #e2e8f0; }
      .modal-head h2 { margin: 0; }
      .modal-body { padding: 22px; display: grid; gap: 12px; }
      .modal-actions { display: flex; gap: 10px; justify-content: flex-end; padding: 0 22px 22px; }
      @media (max-width: 850px) {
        .head { align-items: flex-start; flex-direction: column; }
        table, thead, tbody, th, td, tr { display: block; }
        thead { display: none; }
        tr { border-bottom: 1px solid #e5e7eb; padding: 8px 0; }
        td { display: flex; justify-content: space-between; gap: 14px; }
        td::before { content: attr(data-label); font-weight: 700; color: #475569; }
      }
    </style>
  </head>
  <body>
    {% include "_navbar.html" %}
    <div class="container">
      <div class="head">
        <h1>Owner User Management</h1>
        <button onclick="openAddModal()">Add User</button>
      </div>

      <div class="filters">
        <select id="roleFilter" onchange="load()">
          <option value="">All roles</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
          <option value="operation">Operation</option>
          <option value="teacher">Teacher</option>
          <option value="sales">Educational Consultant</option>
        </select>
        <select id="branchFilter" onchange="load()">
          <option value="">All branches</option>
          <option value="AlAin">AlAin</option>
          <option value="Abu Dhabi">Abu Dhabi</option>
        </select>
      </div>

      <div id="feedback" class="feedback"></div>

      <table style="margin-top: 18px">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Role</th>
            <th>Branch</th>
            <th>Save Branch</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>

    <div id="addModal" class="modal-backdrop" onclick="maybeCloseModal(event)">
      <div class="modal">
        <div class="modal-head">
          <h2>Add User</h2>
          <button class="ghost" onclick="closeAddModal()">Close</button>
        </div>
        <div class="modal-body">
          <input id="name" placeholder="Full Name" />
          <input id="username" placeholder="Username" autocomplete="off" />
          <input id="password" type="password" placeholder="Temporary Password" autocomplete="new-password" />
          <select id="role">
            <option value="manager">Manager</option>
            <option value="teacher">Teacher</option>
            <option value="sales">Educational Consultant</option>
            <option value="operation">Operation</option>
            <option value="admin">Admin</option>
          </select>
          <select id="branch">
            <option value="">Select branch</option>
            <option value="AlAin">AlAin</option>
            <option value="Abu Dhabi">Abu Dhabi</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="ghost" onclick="closeAddModal()">Cancel</button>
          <button onclick="addUser()">Save User</button>
        </div>
      </div>
    </div>

    <div id="resetModal" class="modal-backdrop" onclick="maybeCloseResetModal(event)">
      <div class="modal">
        <div class="modal-head">
          <h2>Reset Password</h2>
          <button class="ghost" onclick="closeResetModal()">Close</button>
        </div>
        <div class="modal-body">
          <div id="resetUserName"></div>
          <input id="ownerPassword" type="password" placeholder="Owner Password" autocomplete="current-password" />
          <input id="newPassword" type="password" placeholder="New Password" autocomplete="new-password" />
        </div>
        <div class="modal-actions">
          <button class="ghost" onclick="closeResetModal()">Cancel</button>
          <button class="dark" onclick="resetPassword()">Reset Password</button>
        </div>
      </div>
    </div>

    <div id="deleteModal" class="modal-backdrop" onclick="maybeCloseDeleteModal(event)">
      <div class="modal">
        <div class="modal-head">
          <h2>Delete User</h2>
          <button class="ghost" onclick="closeDeleteModal()">Close</button>
        </div>
        <div class="modal-body">
          <div id="deleteUserName"></div>
          <input id="deletePassword" type="password" placeholder="Owner Password" autocomplete="current-password" />
        </div>
        <div class="modal-actions">
          <button class="ghost" onclick="closeDeleteModal()">Cancel</button>
          <button class="danger" onclick="deleteUser()">Delete</button>
        </div>
      </div>
    </div>

    <script>
      const currentUserId = Number("{{ user_id or 0 }}");
      let pendingResetUserId = null;
      let pendingDeleteUserId = null;
      let loadedUsersById = new Map();

      function cleanUsername(value) {
        return String(value || "").replace(/\s+/g, "");
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function displayRole(value) {
        if (value === "sales") return "Educational Consultant";
        if (value === "manager") return "Manager";
        if (value === "superadmin") return "Owner";
        return value;
      }

      async function load() {
        const query = new URLSearchParams();
        const selectedRole = document.getElementById("roleFilter").value;
        const selectedBranch = document.getElementById("branchFilter").value;
        if (selectedRole) query.set("role", selectedRole);
        if (selectedBranch) query.set("branch", selectedBranch);

        const response = await fetch(`/api/users?${query.toString()}`);
        const users = await response.json();
        const table = document.getElementById("table");
        table.innerHTML = "";
        loadedUsersById = new Map(users.map((user) => [Number(user.id), user]));
        users.forEach((user) => {
          table.innerHTML += `
            <tr>
              <td data-label="Name">${escapeHtml(user.name)}</td>
              <td data-label="Username">${escapeHtml(user.username || "-")}</td>
              <td data-label="Role">${displayRole(user.role)}</td>
              <td data-label="Branch">
                <select data-branch-user="${user.id}">
                  <option value="AlAin" ${user.branch === "AlAin" ? "selected" : ""}>AlAin</option>
                  <option value="Abu Dhabi" ${user.branch === "Abu Dhabi" ? "selected" : ""}>Abu Dhabi</option>
                </select>
              </td>
              <td data-label="Save Branch">
                <button class="success" onclick="saveBranch(${user.id})">Save</button>
              </td>
              <td data-label="Actions">
                <div class="actions">
                  <button class="dark" onclick="openResetModal(${user.id})">Reset Password</button>
                  ${user.id === currentUserId ? "-" : `<button class="danger" onclick="openDeleteModal(${user.id})">Delete</button>`}
                </div>
              </td>
            </tr>
          `;
        });
      }

      function openAddModal() {
        document.getElementById("addModal").classList.add("open");
        document.getElementById("feedback").innerText = "";
      }

      function closeAddModal() {
        document.getElementById("addModal").classList.remove("open");
      }

      function maybeCloseModal(event) {
        if (event.target.id === "addModal") closeAddModal();
      }

      async function addUser() {
        const username = cleanUsername(document.getElementById("username").value);
        document.getElementById("username").value = username;
        if (!username) {
          alert("Username is required");
          return;
        }

        const response = await fetch("/admin/teachers/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value.trim(),
            username,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
            branch: document.getElementById("branch").value,
          }),
        });
        const payload = await response.json();
        if (!response.ok) {
          alert(payload.error || "Unable to create user");
          return;
        }
        document.getElementById("name").value = "";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("branch").value = "";
        document.getElementById("feedback").innerText = "User added successfully.";
        closeAddModal();
        load();
      }

      async function saveBranch(userId) {
        const select = document.querySelector(`[data-branch-user="${userId}"]`);
        const response = await fetch(`/admin/users/${userId}/branch`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ branch: select.value }),
        });
        const payload = await response.json();
        if (!response.ok) {
          alert(payload.error || "Unable to update branch");
          return;
        }
        document.getElementById("feedback").innerText = "Branch updated successfully.";
        load();
      }

      function openResetModal(userId) {
        const user = loadedUsersById.get(Number(userId)) || {};
        pendingResetUserId = userId;
        document.getElementById("resetUserName").innerText = `User: ${user.name || user.username || userId}`;
        document.getElementById("ownerPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("resetModal").classList.add("open");
      }

      function closeResetModal() {
        pendingResetUserId = null;
        document.getElementById("resetModal").classList.remove("open");
      }

      function maybeCloseResetModal(event) {
        if (event.target.id === "resetModal") closeResetModal();
      }

      async function resetPassword() {
        if (!pendingResetUserId) return;
        const response = await fetch(`/admin/users/${pendingResetUserId}/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            account_password: document.getElementById("ownerPassword").value,
            new_password: document.getElementById("newPassword").value,
          }),
        });
        const payload = await response.json();
        if (!response.ok) {
          alert(payload.error || "Unable to reset password");
          return;
        }
        document.getElementById("feedback").innerText = "Password reset successfully.";
        closeResetModal();
      }

      function openDeleteModal(userId) {
        const user = loadedUsersById.get(Number(userId)) || {};
        pendingDeleteUserId = userId;
        document.getElementById("deleteUserName").innerText = `User: ${user.name || user.username || userId}`;
        document.getElementById("deletePassword").value = "";
        document.getElementById("deleteModal").classList.add("open");
      }

      function closeDeleteModal() {
        pendingDeleteUserId = null;
        document.getElementById("deleteModal").classList.remove("open");
      }

      function maybeCloseDeleteModal(event) {
        if (event.target.id === "deleteModal") closeDeleteModal();
      }

      async function deleteUser() {
        if (!pendingDeleteUserId) return;
        const response = await fetch(`/admin/users/${pendingDeleteUserId}`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account_password: document.getElementById("deletePassword").value }),
        });
        const payload = await response.json();
        if (!response.ok) {
          alert(payload.error || "Unable to delete user");
          return;
        }
        document.getElementById("feedback").innerText = "User deleted successfully.";
        closeDeleteModal();
        load();
      }

      document.getElementById("username").addEventListener("keydown", (event) => {
        if (event.key === " ") event.preventDefault();
      });
      document.getElementById("username").addEventListener("input", (event) => {
        event.target.value = cleanUsername(event.target.value);
      });

      load();
    </script>
  </body>
</html>
