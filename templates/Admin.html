<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="/static/css/style.css" />
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; }
      .container { max-width: 1460px; margin: 32px auto; background: white; padding: 24px; border-radius: 12px; }
      .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 20px; }
      .card { padding: 16px; border-radius: 10px; color: white; font-weight: bold; }
      .pending_operation { background: #d97706; }
      .approved { background: #2563eb; }
      .delivered { background: #16a34a; }
      .rejected { background: #991b1b; }
      .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
      .search-wrap input { min-width: 230px; }
      input, select, button { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; }
      .table-wrap { border: 1px solid #e5e7eb; border-radius: 12px; overflow: visible; }
      table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      th, td { padding: 10px; border-bottom: 1px solid #e5e7eb; text-align: center; vertical-align: middle; }
      th { background: #f8fafc; white-space: normal; line-height: 1.2; }
      .student-col { width: 12%; }
      .teacher-col { width: 9%; }
      .consultant-col { width: 12%; }
      .phone-col { width: 8%; }
      .email-col { width: 10%; }
      .status-col { width: 8%; }
      .view-col { width: 7%; }
      .email-cell, .phone-cell, .status-cell { white-space: normal; overflow-wrap: anywhere; word-break: break-word; text-align: center; }
      @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    </style>
  </head>
  <body>
    {% include "_navbar.html" %}
    <div class="container">
      <h1>Admin Operation Monitor</h1>
      <div class="stats">
        <div class="card pending_operation">Pending: <span id="pendingCount">0</span></div>
        <div class="card approved">Approved: <span id="approvedCount">0</span></div>
        <div class="card delivered">Delivered: <span id="deliveredCount">0</span></div>
        <div class="card rejected">Not Accepted: <span id="rejectedCount">0</span></div>
      </div>

      <div class="filters">
        <div class="search-wrap">
          <input id="phoneFilter" placeholder="Search by student phone" />
        </div>
        <select id="teacherFilter" onchange="load()">
          <option value="">All teachers</option>
        </select>
        {% if role == 'manager' %}
        <select id="branchFilter" onchange="handleBranchChange()">
          <option value="">All branches</option>
          <option value="AlAin">AlAin</option>
          <option value="Abu Dhabi">Abu Dhabi</option>
        </select>
        {% endif %}
        <select id="statusFilter" onchange="load()">
          <option value="">All statuses</option>
          <option value="pending_operation">Pending</option>
          <option value="approved">Approved</option>
          <option value="delivered">Delivered</option>
          <option value="rejected">Not accepted</option>
        </select>
      </div>

      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th class="student-col">Student</th>
            <th class="teacher-col">Teacher</th>
            <th>Level</th>
            <th>Type</th>
            <th class="consultant-col">Educational Consultant</th>
            <th class="phone-col">Phone</th>
            <th class="email-col">Email</th>
            <th class="status-col">Status</th>
            <th>Email Sent</th>
            <th>Received</th>
            <th class="view-col">View</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      </div>
    </div>

    <script>
      let allRows = [];

      function formatStatusLabel(status) {
        if (status === "pending_operation") return "pending";
        return String(status || "-").replaceAll("_", " ");
      }

      function displayPhone(row) {
        const value = String(row.student_id || "").trim();
        if (!value || value.startsWith("legacy-")) return "-";
        return value;
      }

      async function load() {
        const phone = document.getElementById("phoneFilter").value.trim();
        const teacher = document.getElementById("teacherFilter").value;
        const status = document.getElementById("statusFilter").value;
        const branchFilter = document.getElementById("branchFilter");
        const branch = branchFilter ? branchFilter.value : "";
        const query = new URLSearchParams();
        if (phone) query.set("phone", phone);
        if (teacher) query.set("teacher_id", teacher);
        if (status) query.set("status", status);
        if (branch) query.set("branch", branch);
        const response = await fetch(`/admin/reports?${query.toString()}`);
        allRows = await response.json();
        render();
      }

      function render() {
        const counts = { pending_operation: 0, approved: 0, delivered: 0, rejected: 0 };
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        allRows.forEach((row) => {
          counts[row.status] = (counts[row.status] || 0) + 1;
          tbody.innerHTML += `
            <tr>
              <td>${row.id}</td>
              <td>${row.student_name}</td>
              <td>${row.teacher_name}</td>
              <td>${row.level || "-"}</td>
              <td>${row.report_type}</td>
              <td>${row.sales_name || "-"}</td>
              <td class="phone-cell">${displayPhone(row)}</td>
              <td class="email-cell">${row.student_email || "-"}</td>
              <td class="status-cell">${formatStatusLabel(row.status)}</td>
              <td>${row.sent_student_email ? "Yes" : "No"}</td>
              <td>${row.created_at || "-"}</td>
              <td><a href="/view/${row.id}" target="_blank">Preview</a></td>
            </tr>
          `;
        });
        document.getElementById("pendingCount").innerText = counts.pending_operation;
        document.getElementById("approvedCount").innerText = counts.approved;
        document.getElementById("deliveredCount").innerText = counts.delivered;
        document.getElementById("rejectedCount").innerText = counts.rejected;
      }

      async function loadTeachers() {
        const branchFilter = document.getElementById("branchFilter");
        const query = new URLSearchParams({ role: "teacher" });
        if (branchFilter && branchFilter.value) query.set("branch", branchFilter.value);
        const response = await fetch(`/api/users?${query.toString()}`);
        const teachers = await response.json();
        const select = document.getElementById("teacherFilter");
        select.innerHTML = '<option value="">All teachers</option>';
        teachers.forEach((teacher) => {
          select.innerHTML += `<option value="${teacher.id}">${teacher.name}</option>`;
        });
      }

      function handleBranchChange() {
        loadTeachers().then(load);
      }

      let searchTimer = null;
      document.getElementById("phoneFilter").addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(load, 250);
      });

      loadTeachers().then(load);
    </script>
  </body>
</html>
