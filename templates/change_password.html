<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="/static/css/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <style>
      body { min-height: 100vh; margin: 0; font-family: Arial, sans-serif; background: #eef2f7; display: flex; align-items: center; justify-content: center; padding: 24px; color: #0f172a; }
      .card { width: min(440px, 100%); background: white; border-radius: 14px; padding: 28px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.13); }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { margin: 0 0 22px; color: #64748b; line-height: 1.5; }
      .field { margin-bottom: 14px; }
      input { width: 100%; padding: 13px 14px; border: 1px solid #cbd5e1; border-radius: 9px; box-sizing: border-box; font-size: 16px; }
      button { width: 100%; padding: 13px; border: 0; border-radius: 9px; background: #14213d; color: white; font-weight: 800; cursor: pointer; font-size: 15px; }
      .error { margin-bottom: 14px; padding: 11px 13px; border-radius: 9px; background: #fee2e2; color: #991b1b; font-weight: 700; font-size: 14px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Change Password</h1>
      <p>Welcome {{ user_name or "User" }}. Please set your own password before continuing.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" autocomplete="off">
        <div class="field">
          <input type="password" name="new_password" placeholder="New password" autocomplete="new-password" required />
        </div>
        <div class="field">
          <input type="password" name="confirm_password" placeholder="Confirm password" autocomplete="new-password" required />
        </div>
        <button type="submit">Save Password</button>
      </form>
    </main>
  </body>
</html>
